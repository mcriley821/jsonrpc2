version: "2"
linters:
  default: all
  disable:
    - depguard
    - wsl # deprecated
    - err113 # prefer wrapped errors
    - ireturn
    - varnamelen
    - noinlineerr
    - paralleltest

issues:
  uniq-by-line: false
  exclude-rules:
    - linters: [gosec]
      text: "G118"

severity:
  default: error
